<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combo Library | ABA Wiki</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css.css">
</head>
<body>
    <div class="loader" id="loader">
        <div class="loader-ring"><img class="loader-logo" src="images/site-logo.png" alt="ABA Wiki logo" onerror="this.onerror=null; this.src='https://static.wikia.nocookie.net/animebattlearenaaba/images/e/e6/Site-logo.png/revision/latest?cb=20210628140132'"></div>
        <p class="loader-text">Loading<span class="loader-dots"><span>.</span><span>.</span><span>.</span></span></p>
        <div class="loader-bar"><span class="loader-bar-fill"></span></div>
    </div>

    <div class="page">
        <header class="topbar">
            <div class="brand"><a href="index.html"><img src="images/site-logo.png" alt="ABA Wiki logo" onerror="this.onerror=null; this.src='https://static.wikia.nocookie.net/animebattlearenaaba/images/e/e6/Site-logo.png/revision/latest?cb=20210628140132'"></a></div>
            <div class="hotbar" id="hotbar">
                <button class="hotbar-label" id="info-toggle" aria-expanded="false" aria-controls="info-menu" aria-label="Open menu"><svg class="hotbar-icon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M13 2 3 14h7l-1 8 11-14h-7l1-8 11-14h-7l1-6z"/></svg></button>
                <div class="hotbar-menu" id="info-menu"><a href="characters.html">Characters</a><a href="maps.html">Maps</a><a href="combos.html">Combos</a><a href="skins.html">Skins</a></div>
            </div>
            <div class="topbar-info" id="topbar-info">
                <a href="characters.html">Characters</a><a href="maps.html">Maps</a><a href="combos.html">Combos</a><a href="skins.html">Skins</a>
                <button class="info-close" id="info-close" aria-label="Close info menu"><svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M18.3 5.71 12 12.01l6.3 6.3-1.42 1.41L10.59 13.4l-6.3 6.3-1.41-1.41 6.3-6.3-6.3-6.3L4.29 4.3l6.3 6.3 6.3-6.3z"/></svg></button>
            </div>
        </header>

        <main class="layout">
            <aside class="sidebar">
                <ul>
                    <li><a href="#combo-gallery">Combo Gallery</a></li>
                    <li><a href="#submit-combo">Submit a Combo</a></li>
                    <li><a href="characters.html">Characters</a></li>
                </ul>
            </aside>

            <section class="content combo-library" aria-live="polite">
                <header class="hero combo-library-hero">
                    <p class="eyebrow">Community Combos</p>
                    <h1>Combo Library</h1>
                    <p class="intro">Watch approved community combo clips and submit your own ABA sequence.</p>
                </header>

                <section class="profile-panel" id="combo-gallery">
                    <div class="section-header"><h2>Community Combos</h2></div>
                    <p class="combo-status" id="combo-status">Loading combos...</p>
                    <div class="combo-grid" id="combo-grid"></div>
                </section>

                <section class="profile-panel" id="submit-combo">
                    <div class="section-header"><h2>Submit a Combo</h2></div>
                    <form class="combo-form" id="combo-form">
                        <label>Combo title<input id="combo-title" name="title" type="text" maxlength="80" required></label>
                        <label>Character<input id="combo-character" name="character" type="text" maxlength="80" required></label>
                        <label class="combo-form-wide">Notes<textarea id="combo-notes" name="notes" maxlength="360" rows="3"></textarea></label>
                        <label class="combo-form-wide">Video clip<input id="combo-video" name="video" type="file" accept="video/mp4,video/webm,video/quicktime" required></label>
                        <div class="combo-form-actions combo-form-wide">
                            <button id="combo-submit" type="submit">Submit Combo</button>
                            <p class="combo-submit-status" id="combo-submit-status" role="status"></p>
                        </div>
                    </form>
                </section>
            </section>
        </main>
    </div>

    <script type="module" src="js/main.js"></script>
    <script type="module" src="combos.js"></script>
</body>
</html>
