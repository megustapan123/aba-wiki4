<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skin Library | ABA Wiki</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css.css">
</head>
<body>
    <div class="loader" id="loader">
        <div class="loader-ring"><img class="loader-logo" src="images/site-logo.png" alt="ABA Wiki logo" onerror="this.onerror=null; this.src='https://static.wikia.nocookie.net/animebattlearenaaba/images/e/e6/Site-logo.png/revision/latest?cb=20210628140132'"></div>
        <p class="loader-text">Loading<span class="loader-dots"><span>.</span><span>.</span><span>.</span></span></p>
        <div class="loader-bar"><span class="loader-bar-fill"></span></div>
    </div>

    <div class="page">
        <header class="topbar">
            <div class="brand"><a href="index.html"><img src="images/site-logo.png" alt="ABA Wiki logo" onerror="this.onerror=null; this.src='https://static.wikia.nocookie.net/animebattlearenaaba/images/e/e6/Site-logo.png/revision/latest?cb=20210628140132'"></a></div>
            <div class="hotbar" id="hotbar">
                <button class="hotbar-label" id="info-toggle" aria-expanded="false" aria-controls="info-menu" aria-label="Open menu"><svg class="hotbar-icon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M13 2 3 14h7l-1 8 11-14h-7l1-6z"/></svg></button>
                <div class="hotbar-menu" id="info-menu"><a href="characters.html">Characters</a><a href="maps.html">Maps</a><a href="skins.html">Skins</a></div>
            </div>
            <div class="topbar-info" id="topbar-info">
                <a href="characters.html">Characters</a><a href="maps.html">Maps</a><a href="skins.html">Skins</a>
                <button class="info-close" id="info-close" aria-label="Close info menu"><svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M18.3 5.71 12 12.01l6.3 6.3-1.42 1.41L10.59 13.4l-6.3 6.3-1.41-1.41 6.3-6.3-6.3-6.3L4.29 4.3l6.3 6.3 6.3-6.3z"/></svg></button>
            </div>
        </header>

        <main class="layout">
            <aside class="sidebar">
                <ul>
                    <li><a href="characters.html">All Characters</a></li>
                    <li><a href="#skin-picker">Choose Character</a></li>
                    <li><a href="#skin-gallery">Skin Gallery</a></li>
                </ul>
            </aside>

            <section class="content skin-library" aria-live="polite">
                <header class="hero skin-library-hero">
                    <p class="eyebrow">Anime Battle Arena</p>
                    <h1>Skin Library</h1>
                    <p class="intro">Browse every skin documented on the ABA Wiki, one character at a time.</p>
                </header>

                <section class="profile-panel skin-picker-panel" id="skin-picker">
                    <div class="section-header"><h2>Choose a Character</h2></div>
                    <form id="skin-character-form" class="skin-character-form">
                        <label class="visually-hidden" for="skin-character-input">Character name</label>
                        <input id="skin-character-input" type="search" list="skin-character-options" placeholder="Search a character" autocomplete="off" required>
                        <datalist id="skin-character-options"></datalist>
                        <button type="submit">View Skins</button>
                    </form>
                </section>

                <section class="profile-panel" id="skin-gallery">
                    <div class="skin-library-heading" id="skin-library-heading" hidden>
                        <img id="skin-library-image" alt="">
                        <div>
                            <p class="eyebrow">Character Skins</p>
                            <h2 id="skin-library-name"></h2>
                            <a class="profile-source" id="skin-library-source" target="_blank" rel="noopener noreferrer">View character profile &nearr;</a>
                        </div>
                    </div>
                    <p class="skin-library-status" id="skin-library-status">Loading skins...</p>
                    <div class="skin-grid" id="skin-library-grid"></div>
                </section>
            </section>
        </main>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
